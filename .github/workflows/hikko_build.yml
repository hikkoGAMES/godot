name: hikko Engine Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  SCONSFLAGS: "platform=windows target=editor"

jobs:
  build-windows-editor:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup SCons
        run: pip install scons

      - name: Build hikko Editor (Windows)
        run: |
          scons platform=windows target=editor module_mono_enabled=no module_openxr_enabled=no module_mobile_vr_enabled=no module_webxr_enabled=no

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikko_editor_windows
          path: bin/

  build-linux-editor:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup SCons
        run: pip install scons

      - name: Build hikko Editor (Linux)
        run: |
          scons platform=linuxbsd target=editor module_mono_enabled=no module_openxr_enabled=no module_mobile_vr_enabled=no module_webxr_enabled=no

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikko_editor_linux
          path: bin/
